{% extends "base.html" %}
{% block title %}ActivSync — Log in{% endblock %}
{% block content %}
<section class="panel auth-card">
    <div class="panel-body stack">
        <div>
            <p class="page-kicker brand-lockup" aria-label="ActivSync"><span class="brand-activ">Activ</span><span class="brand-sync">Sync</span></p>
            <h1>Log in</h1>
        </div>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form class="stack" method="post" action="/login">
            <label>Password
                <input type="password" name="password" placeholder="Password" required>
            </label>
            <button class="primary-action" type="submit">Log in</button>
        </form>
    </div>
</section>
{% endblock %}
