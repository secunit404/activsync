<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/static/favicon.png" type="image/png">
    <title>{% if dev_mode %}[DEV] {% endif %}{% block title %}ActivSync{% endblock %}</title>
    <script>
        // Apply the saved theme before first paint to avoid a flash of the wrong theme.
        (function () {
            try {
                var saved = localStorage.getItem("activsync-theme");
                if (saved === "light" || saved === "dark") {
                    document.documentElement.setAttribute("data-theme", saved);
                }
            } catch (e) {}
        })();
        function activsyncEffectiveTheme() {
            var override = document.documentElement.getAttribute("data-theme");
            if (override === "light" || override === "dark") return override;
            return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        function activsyncSyncToggles() {
            var isDark = activsyncEffectiveTheme() === "dark";
            document.querySelectorAll(".theme-toggle").forEach(function (b) {
                b.setAttribute("aria-pressed", String(isDark));
            });
        }
        function activsyncToggleTheme() {
            var next = activsyncEffectiveTheme() === "dark" ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", next);
            try { localStorage.setItem("activsync-theme", next); } catch (e) {}
            activsyncSyncToggles();
        }
        function activsyncSetLoading(form) {
            var button = form.querySelector('button[type="submit"]');
            if (!button) return true;
            if (form.dataset.loading === "true") return false;
            form.dataset.loading = "true";
            button.disabled = true;
            button.setAttribute("aria-busy", "true");
            return true;
        }
        // Reopen any details dialogs that were open before an #activity-table swap.
        // Must run on htmx:afterSwap (same task as the DOM swap) so the modal is
        // re-shown before the browser paints — reopening later (e.g. on afterSettle)
        // leaves a frame with no modal, which reads as a flicker. This is a global
        // listener because a swapped-in element's own hx-on::after-swap does not fire
        // (its handler isn't attached when htmx dispatches afterSwap on the new node).
        function activsyncReopenDialogs() {
            var ids = window._activsyncOpenDialogIds || [];
            ids.forEach(function (id) {
                var d = document.querySelector('.activity-dialog[data-gid="' + id + '"]');
                if (d && !d.open) d.showModal();
            });
            window._activsyncOpenDialogIds = [];
        }
        document.addEventListener("DOMContentLoaded", function () {
            activsyncSyncToggles();
            document.body.addEventListener("htmx:afterSwap", activsyncReopenDialogs);
            document.addEventListener("keydown", function (event) {
                if (event.key === "Tab") document.body.classList.add("keyboard-nav");
            });
            document.addEventListener("pointerdown", function () {
                document.body.classList.remove("keyboard-nav");
            });
        });
    </script>
    <script src="https://unpkg.com/htmx.org@2.0.4"
            integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+"
            crossorigin="anonymous"></script>
    <style>
        /* ---- Theme-independent tokens ---- */
        :root {
            --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --mono: ui-monospace, SFMono-Regular, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
            --radius: 6px;
            --radius-sm: 4px;
        }

        /* ---- Light palette (default) ---- */
        :root {
            color-scheme: light;
            --bg: #f5f7f9;
            --surface: #ffffff;
            --surface-2: #f0f3f6;
            --surface-3: #e6ebf0;
            --field: #ffffff;
            --field-border: #c8d1db;
            --ink: #18212b;
            --muted: #5c6976;
            --border: #d8e0e7;
            --border-strong: #b9c5d0;
            --accent: #e85b2a;
            --accent-ink: #c5441b;
            --garmin: #176ca5;
            --garmin-action-ink: #fff;
            --green-action-ink: #fff;
            --focus-ring: #60798c;
            --brand-sync: #f26b38;
            --st-green: #18834d;
            --st-blue: #2865b5;
            --st-amber: #a56b08;
            --st-gray: #66727d;
            --st-red: #b8392a;
            --green-bg: #e2f3e9; --green-ink: #17643d;
            --blue-bg: #e7f0fc; --blue-ink: #20569b;
            --yellow-bg: #fff3d6; --yellow-ink: #76500a;
            --red-bg: #fde8e4; --red-ink: #9d3024;
            --gray-bg: #eef1f4;
            --scrim: rgba(24, 33, 43, 0.42);
            --shadow: 0 1px 2px rgba(24, 33, 43, 0.06);
            --shadow-modal: 0 24px 60px rgba(24, 33, 43, 0.22);
        }

        /* ---- Dark palette ---- */
        :root[data-theme="dark"] {
            color-scheme: dark;
            --bg: #151a21;
            --surface: #1c232b;
            --surface-2: #252e38;
            --surface-3: #2e3945;
            --field: #11161c;
            --field-border: #3e4b59;
            --ink: #f3f6f8;
            --muted: #a7b2bd;
            --border: #303b47;
            --border-strong: #465462;
            --accent: #f06432;
            --accent-ink: #ff9a72;
            --garmin: #63b8ee;
            --garmin-action-ink: #15212b;
            --green-action-ink: #15212b;
            --focus-ring: #73818d;
            --brand-sync: #f26b38;
            --st-green: #58d395;
            --st-blue: #75aafa;
            --st-amber: #e5b04c;
            --st-gray: #9ca8b3;
            --st-red: #ff806d;
            --green-bg: #193a2a; --green-ink: #7bdfa7;
            --blue-bg: #1c3150; --blue-ink: #98c0ff;
            --yellow-bg: #3c3018; --yellow-ink: #f0c767;
            --red-bg: #40231f; --red-ink: #ffa391;
            --gray-bg: #232c35;
            --scrim: rgba(0, 0, 0, 0.55);
            --shadow: 0 1px 0 rgba(0, 0, 0, 0.32);
            --shadow-modal: 0 28px 70px rgba(0, 0, 0, 0.48);
        }
        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]) {
                color-scheme: dark;
                --bg: #151a21;
                --surface: #1c232b;
                --surface-2: #252e38;
                --surface-3: #2e3945;
                --field: #11161c;
                --field-border: #3e4b59;
                --ink: #f3f6f8;
                --muted: #a7b2bd;
                --border: #303b47;
                --border-strong: #465462;
                --accent: #f06432;
                --accent-ink: #ff9a72;
                --garmin: #63b8ee;
                --garmin-action-ink: #15212b;
                --green-action-ink: #15212b;
                --focus-ring: #73818d;
                --brand-sync: #f26b38;
                --st-green: #58d395;
                --st-blue: #75aafa;
                --st-amber: #e5b04c;
                --st-gray: #9ca8b3;
                --st-red: #ff806d;
                --green-bg: #193a2a; --green-ink: #7bdfa7;
                --blue-bg: #1c3150; --blue-ink: #98c0ff;
                --yellow-bg: #3c3018; --yellow-ink: #f0c767;
                --red-bg: #40231f; --red-ink: #ffa391;
                --gray-bg: #232c35;
                --scrim: rgba(0, 0, 0, 0.55);
                --shadow: 0 1px 0 rgba(0, 0, 0, 0.32);
                --shadow-modal: 0 28px 70px rgba(0, 0, 0, 0.48);
            }
        }

        * { box-sizing: border-box; }
        html { -webkit-text-size-adjust: 100%; }
        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--ink);
            font-family: var(--sans);
            font-size: 16px;
            line-height: 1.5;
        }

        a { color: var(--accent-ink); font-weight: 650; text-decoration: none; }
        a:hover { text-decoration: underline; }
        h1, h2, h3, p { margin: 0; }
        h1 { font-size: clamp(1.8rem, 7vw, 2.7rem); line-height: 1.05; letter-spacing: -0.01em; }
        h2 { font-size: 1.05rem; }
        h3 {
            color: var(--muted);
            font-family: var(--mono);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .app-shell {
            width: min(1120px, 100%);
            margin: 0 auto;
            padding: max(18px, env(safe-area-inset-top)) 16px 40px;
        }

        .page-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 18px;
            margin: 8px 0 22px;
        }

        .page-kicker {
            margin-bottom: 6px;
            color: var(--muted);
            font-family: var(--mono);
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .brand-lockup {
            color: var(--ink);
            font-family: var(--sans);
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            text-transform: none;
        }
        .brand-activ { color: var(--garmin); }
        .brand-sync { color: var(--brand-sync); }
        .brand-suffix { color: var(--muted); font-weight: 650; }

        .top-nav, .button-row, .sync-actions {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .header-actions {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-left: auto;
        }
        .mobile-theme-toggle {
            display: none;
        }

        .top-nav { justify-content: flex-end; }
        .nav-toggle { position: absolute; opacity: 0; pointer-events: none; }
        .nav-toggle-label { display: none; }
        .nav-menu-items {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 8px;
        }
        .nav-menu-items .button-link,
        .nav-menu-items .button-link:hover {
            border-color: transparent;
            background: transparent;
            color: var(--muted);
            text-decoration: none;
        }
        .nav-menu-items .button-link[aria-current="page"] {
            border-color: transparent;
            background: transparent;
            color: var(--ink);
            font-weight: 750;
            text-decoration: underline;
            text-decoration-color: var(--border-strong);
            text-decoration-thickness: 2px;
            text-underline-offset: 5px;
        }
        .nav-menu-items .button-link[aria-current="page"]:hover {
            border-color: transparent;
            background: transparent;
        }
        form.inline { display: inline-flex; margin: 0; }

        button,
        .button-link {
            display: inline-flex;
            min-height: 44px;
            min-width: 44px;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            background: var(--surface-2);
            color: var(--ink);
            cursor: pointer;
            font: inherit;
            font-weight: 650;
            padding: 10px 14px;
            text-decoration: none;
            transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
        }

        button:hover,
        .button-link:hover {
            border-color: var(--border-strong);
            background: var(--surface-3);
            text-decoration: none;
        }

        button:active,
        .button-link:active { background: var(--surface-3); }

        button:disabled,
        button:disabled:hover {
            border-color: var(--border);
            background: var(--surface-2);
            color: var(--muted);
            cursor: not-allowed;
            opacity: 0.55;
        }

        .primary-action {
            border-color: var(--accent);
            background: var(--accent);
            color: #fff;
        }

        .primary-action:hover {
            border-color: var(--accent-ink);
            background: var(--accent-ink);
            color: #fff;
        }

        .primary-action.garmin-action {
            border-color: var(--garmin);
            background: var(--garmin);
            color: var(--garmin-action-ink);
        }

        .primary-action.garmin-action:hover {
            border-color: color-mix(in srgb, var(--garmin) 82%, #000);
            background: color-mix(in srgb, var(--garmin) 82%, #000);
            color: var(--garmin-action-ink);
        }

        .settings-strava-panel .primary-action {
            align-self: flex-start;
            justify-self: start;
            width: auto;
        }

        /* Sync controls follow their platform colors: Garmin = blue, Strava = orange */
        .sync-actions button {
            background: transparent;
            border-color: var(--border-strong);
            color: var(--ink);
        }
        .sync-actions button:nth-child(1) {
            border-color: var(--garmin);
            color: var(--garmin);
        }
        .sync-actions button:nth-child(1):hover {
            border-color: var(--garmin);
            background: color-mix(in srgb, var(--garmin) 13%, transparent);
            color: var(--garmin);
        }
        .sync-actions button:nth-child(2) {
            border-color: var(--accent);
            color: var(--accent-ink);
        }
        .sync-actions button:nth-child(2):hover {
            border-color: var(--accent);
            background: color-mix(in srgb, var(--accent) 13%, transparent);
            color: var(--accent-ink);
        }

        .ghost-button {
            background: transparent;
            border-color: transparent;
            color: var(--muted);
        }

        /* Theme toggle */
        .theme-toggle {
            min-width: 44px;
            padding: 10px;
            border-color: transparent;
            background: transparent;
            color: var(--muted);
        }
        .theme-toggle:hover {
            border-color: transparent;
            background: transparent;
            color: var(--ink);
        }
        .theme-toggle svg { display: none; width: 18px; height: 18px; }
        .theme-toggle .icon-moon { display: block; }
        :root[data-theme="dark"] .theme-toggle .icon-moon { display: none; }
        :root[data-theme="dark"] .theme-toggle .icon-sun { display: block; }
        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]) .theme-toggle .icon-moon { display: none; }
            :root:not([data-theme="light"]) .theme-toggle .icon-sun { display: block; }
        }

        .panel {
            margin-bottom: 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .panel-body { padding: 16px; }
        .stack { display: grid; gap: 14px; }
        .section-title { margin: 26px 0 10px; }
        .hint { color: var(--muted); font-size: 0.9rem; }
        .error {
            border: 1px solid var(--red-ink);
            border-radius: var(--radius-sm);
            background: var(--red-bg);
            color: var(--red-ink);
            padding: 10px 12px;
        }
        .success {
            border: 1px solid var(--green-ink);
            border-radius: var(--radius-sm);
            background: var(--green-bg);
            color: var(--green-ink);
            padding: 10px 12px;
        }
        label {
            display: grid;
            gap: 6px;
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 650;
        }

        .field-title {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .field-info {
            position: relative;
            display: inline-flex;
            width: 16px;
            height: 16px;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-strong);
            border-radius: 50%;
            color: var(--muted);
            cursor: help;
            font-family: var(--mono);
            font-size: 0.68rem;
            font-weight: 750;
            line-height: 1;
        }
        .field-info::after {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            z-index: 5;
            width: min(270px, calc(100vw - 40px));
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            background: var(--surface-3);
            box-shadow: var(--shadow-modal);
            color: var(--ink);
            content: attr(data-tooltip);
            font-family: var(--sans);
            font-size: 0.78rem;
            font-weight: 500;
            line-height: 1.35;
            opacity: 0;
            padding: 8px 10px;
            pointer-events: none;
            transform: translateY(-3px);
            transition: opacity 0.15s ease, transform 0.15s ease;
        }
        .field-info:hover::after,
        .field-info:focus-visible::after {
            opacity: 1;
            transform: translateY(0);
        }

        input:not([type="checkbox"]),
        select,
        textarea {
            width: 100%;
            min-height: 46px;
            border: 1px solid var(--field-border);
            border-radius: var(--radius-sm);
            background: var(--field);
            color: var(--ink);
            font: inherit;
            padding: 10px 12px;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
        }

        body.keyboard-nav input:focus,
        body.keyboard-nav select:focus,
        body.keyboard-nav textarea:focus,
        button:focus-visible,
        a:focus-visible {
            outline: 2px solid color-mix(in srgb, var(--focus-ring) 55%, transparent);
            outline-offset: 2px;
        }

        input[type="checkbox"] {
            width: 1.15rem;
            height: 1.15rem;
            accent-color: var(--accent);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .full-span { grid-column: 1 / -1; }

        .settings-save {
            justify-self: start;
            min-width: 0;
            width: auto;
        }

        .settings-section-heading {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }
        .settings-section-heading h2 { margin: 0; }
        .settings-locked-message {
            display: grid;
            gap: 4px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface-2);
            color: var(--muted);
            padding: 14px;
        }
        .settings-locked-message strong { color: var(--ink); }
        .settings-locked-message p { margin: 0; }
        .setup-panel { border-color: color-mix(in srgb, var(--accent) 35%, var(--border)); }
        .setup-steps {
            display: grid;
            gap: 8px;
            margin: 0;
            padding: 0;
            list-style: none;
        }
        .setup-step {
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: 44px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface-2);
            padding: 8px 10px;
        }
        .setup-step a { color: var(--ink); font-weight: 650; text-decoration: none; }
        .setup-step.is-complete { border-color: var(--green-ink); background: var(--green-bg); }
        .setup-step.is-complete a { color: var(--green-ink); }
        .setup-step-marker { color: var(--muted); font-family: var(--mono); font-weight: 750; }
        .setup-step.is-complete .setup-step-marker { color: var(--green-ink); }
        .conn-row { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; padding: 10px 0; }
        .conn-row + .conn-row { border-top: 1px solid var(--border); }
        .conn-dot { align-self: center; flex: 0 0 auto; width: 9px; height: 9px; border-radius: 50%; box-shadow: 0 0 0 3px color-mix(in srgb, currentColor 20%, transparent); }
        .conn-dot-garmin { background: var(--garmin); color: var(--garmin); }
        .conn-dot-strava { background: var(--accent); color: var(--accent); }
        .conn-identity { display: flex; align-items: baseline; flex: 1 1 auto; min-width: 0; gap: 10px; }
        .conn-name { font-weight: 750; }
        .conn-meta { min-width: 0; color: var(--muted); font-family: var(--mono); font-size: 0.82rem; overflow-wrap: anywhere; }

        .connection-banner,
        .catch-up-banner {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px 16px;
            margin-bottom: 16px;
            padding: 11px 14px;
            border-radius: var(--radius);
            font-size: 0.92rem;
        }
        .connection-banner {
            border: 1px solid var(--yellow-ink);
            background: var(--yellow-bg);
            color: var(--yellow-ink);
        }
        .catch-up-banner {
            border: 1px solid var(--blue-ink);
            background: var(--blue-bg);
            color: var(--blue-ink);
        }
        .connection-banner-text,
        .catch-up-banner-text { flex: 1 1 260px; min-width: 0; }
        .connection-banner .button-link { flex: 0 0 auto; }
        .catch-up-banner form { flex: 0 0 auto; }

        /* A broken connection reads at a glance, not only in the text: the dot
           goes hollow and grey rather than solid brand-coloured. */
        .conn-row[data-connected="false"] .conn-dot {
            background: transparent;
            color: var(--st-gray);
            box-shadow: inset 0 0 0 2px var(--st-gray);
        }
        .conn-row[data-connected="false"] .conn-meta { color: var(--st-amber); }

        .sync-actions button[disabled],
        .primary-action[disabled] {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .connection-manage-button {
            align-self: center;
            flex: 0 0 auto;
            min-height: 38px;
            padding: 7px 12px;
            border-color: var(--border);
            background: transparent;
            color: var(--muted);
            font-size: 0.84rem;
            font-weight: 600;
        }
        .connection-manage-button:hover {
            border-color: var(--border-strong);
            background: var(--surface-2);
            color: var(--ink);
        }
        .connection-manage-button:active { background: var(--surface-3); }
        .button-loading { display: none; align-items: center; gap: 8px; }
        button.htmx-request,
        button[aria-busy="true"] { cursor: wait; }
        button.htmx-request .button-label,
        button[aria-busy="true"] .button-label { display: none; }
        button.htmx-request .button-loading,
        button[aria-busy="true"] .button-loading { display: inline-flex; }
        .button-spinner {
            width: 1em;
            height: 1em;
            border: 2px solid currentColor;
            border-right-color: transparent;
            border-radius: 50%;
            animation: activsync-spin 0.7s linear infinite;
        }
        @keyframes activsync-spin { to { transform: rotate(360deg); } }

        .settings-narrow-field,
        .settings-status {
            width: calc((100% - 12px) / 2);
            max-width: none;
        }

        .hevy-option {
            display: grid;
            gap: 8px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface-2);
            padding: 14px;
        }
        .hevy-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--ink);
            font-size: 1rem;
            font-weight: 650;
            cursor: pointer;
        }
        .hevy-option .hint { margin: 0; }
        .hevy-marker-field {

            }
            .sync-actions { display: grid; grid-template-columns: 1fr 1fr; }
            .sync-actions button { width: 100%; }
            .activity-view-controls {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 8px 10px;
                width: 100%;
                margin-left: 0;
            }
            .select-multiple-button {
                grid-column: 1 / -1;
                justify-self: start;
            }
            .activity-sort-control {
                display: grid;
                gap: 4px;
                width: 100%;
                margin-left: 0;
            }
            .activity-sort-control select { width: 100%; }
            .activity-row {
                grid-template-columns: minmax(76px, auto) minmax(0, 1fr) auto;
                gap: 10px;
                align-items: start;
                padding: 12px;
            }
            .activity-panel.is-selecting .activity-row {
                grid-template-columns: 24px minmax(76px, auto) minmax(0, 1fr) auto;
            }
            .activity-row-select {
                grid-column: 1;
                grid-row: 1;
                padding-top: 2px;
            }
            .activity-panel.is-selecting .activity-row-select {
                display: flex;
            }
            .activity-row-date {
                grid-column: 1;
                grid-row: 1;
                width: 64px;
            }
            .activity-panel.is-selecting .activity-row-date {
                grid-column: 2;
            }
            .activity-row-main {
                grid-column: 2;
                grid-row: 1;
            }
            .activity-panel.is-selecting .activity-row-main {
                grid-column: 3;
            }
            .activity-row-status {
                grid-column: 3;
                grid-row: 1;
            }
            .activity-panel.is-selecting .activity-row-status {
                grid-column: 4;
            }
            .activity-row-actions {
                grid-column: 1 / -1;
                grid-row: 2;
                justify-content: flex-end;
            }
            .activity-row-actions button,
            .activity-row-actions form,
            .activity-row-actions form button { flex: 0 0 auto; }
            .activity-subline { display: flex; gap: 3px 10px; }
            .activity-pagination {
                align-items: stretch;
                flex-direction: column;
            }
            .activity-pagination-summary-group {
                justify-content: flex-start;
            }
            .activity-pagination-links {
                justify-content: space-between;
                flex-wrap: wrap;
            }
            .activity-dialog-meta {
                align-items: flex-start;
            }
            .activity-dialog-meta-actions {
                justify-content: flex-end;
            }
            .activity-dialog {
                width: 100%;
                max-width: none;
                max-height: calc(100dvh - 12px);
                margin: auto 0 0;
                border-radius: 10px 10px 0 0;
            }
            .activity-dialog-card {
                max-height: calc(100dvh - 12px);
                border-radius: 10px 10px 0 0;
                padding: 20px 16px max(20px, env(safe-area-inset-bottom));
            }
            .detail-metric-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
            .activity-dialog.is-editing .drawer-actions {
                bottom: -20px;
                margin: 0 -16px -20px;
                padding: 12px 16px max(20px, env(safe-area-inset-bottom));
            }
            .drawer-actions {
                display: grid;
                grid-template-columns: 1fr;
                gap: 6px;
            }
            .drawer-actions form,
            .drawer-actions button { width: 100%; }
            .check-list { grid-template-columns: 1fr; }
            .auth-card { margin-top: 10vh; }
        }
        .setup-panel-wrap { max-width: 560px; margin: clamp(20px, 7vh, 80px) auto; }
        .setup-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
        .setup-progress { display: flex; gap: 6px; align-items: center; margin: 6px 0 0; padding: 0; list-style: none; }
        .setup-progress li { width: 9px; height: 9px; border-radius: 50%; border: 2px solid var(--border-strong); }
        .setup-progress li.is-done.step-garmin, .setup-progress li.is-active.step-garmin { background: var(--garmin); border-color: var(--garmin); }
        .setup-progress li.is-done.step-strava, .setup-progress li.is-active.step-strava { background: var(--accent); border-color: var(--accent); }
        .setup-progress li.is-active.step-sync, .setup-progress li.is-done.step-sync { background: var(--st-green); border-color: var(--st-green); }
        .setup-card { display: grid; gap: 12px; border: 1px solid var(--border); border-top: 3px solid var(--edge, var(--border)); border-radius: var(--radius); background: var(--surface-2); padding: 14px; }
        .setup-card-garmin { --edge: var(--garmin); }
        .setup-card-strava { --edge: var(--accent); }
        .setup-card-label { display: flex; align-items: center; gap: 10px; }
        .setup-card-label h2 { margin: 0; }
        .setup-num { display: inline-flex; width: 22px; height: 22px; align-items: center; justify-content: center; border-radius: 50%; color: #fff; font-family: var(--mono); font-size: 0.78rem; font-weight: 750; }
        .setup-num-garmin { background: var(--garmin); color: var(--garmin-action-ink); }
        .setup-num-strava { background: var(--accent); }
        .setup-days { max-width: 220px; }
        .setup-sync-title { margin: 0; }
        .setup-sync-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }

        /* First-run completion: the three connections check off in sequence
           (Garmin -> Strava -> Activities), each in its own brand color, then the
           green CTA rises in. Reduced motion shows the finished state at rest. */
        .setup-done { position: relative; }
        .done-checklist { list-style: none; margin: 0; padding: 4px 0 2px; display: grid; gap: 12px; }
        .done-item {
            display: flex; align-items: center; gap: 12px;
            font-size: 1.05rem; font-weight: 650; color: var(--ink);
            opacity: 0; transform: translateY(6px);
            animation: done-item-in 0.42s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            animation-delay: calc(var(--step) * 0.26s);
        }
        .done-check {
            flex: 0 0 auto; display: inline-flex; align-items: center; justify-content: center;
            width: 30px; height: 30px; border-radius: 50%;
            background: color-mix(in srgb, var(--done-tint) 18%, transparent);
            color: var(--done-tint);
            transform: scale(0.2);
            animation: done-check-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            animation-delay: calc(var(--step) * 0.26s + 0.12s);
        }
        .done-check svg {
            width: 18px; height: 18px; fill: none;
            stroke: currentColor; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round;
            stroke-dasharray: 24; stroke-dashoffset: 24;
            animation: done-check-draw 0.34s ease forwards;
            animation-delay: calc(var(--step) * 0.26s + 0.26s);
        }
        .done-item-garmin { --done-tint: var(--garmin); }
        .done-item-strava { --done-tint: var(--accent); }
        .done-item-sync   { --done-tint: var(--st-green); }

        /* In-progress row (during the initial sync): a muted, spinning dot and a
           quiet label, so completion turning it green reads as an achievement. */
        .done-item.is-active { --done-tint: var(--st-gray); }
        .done-item.is-active .done-label { color: var(--muted); font-weight: 600; }
        .done-check .button-spinner { width: 15px; height: 15px; }

        .setup-done-cta {
            justify-self: start; margin-top: 18px;
            border-color: var(--st-green); background: var(--st-green); color: var(--green-action-ink);
            opacity: 0; transform: translateY(8px);
            animation: done-item-in 0.42s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            animation-delay: 1.0s;
        }
        .setup-done-cta:hover {
            border-color: color-mix(in srgb, var(--st-green) 84%, #000);
            background: color-mix(in srgb, var(--st-green) 84%, #000);
            color: var(--green-action-ink);
        }

        @keyframes done-item-in { to { opacity: 1; transform: translateY(0); } }
        @keyframes done-check-pop { 60% { transform: scale(1.12); } to { transform: scale(1); } }
        @keyframes done-check-draw { to { stroke-dashoffset: 0; } }
        @media (prefers-reduced-motion: reduce) {
            .done-item, .done-check, .setup-done-cta { opacity: 1; transform: none; }
            .done-check svg { stroke-dashoffset: 0; }
        }

        /* Development-mode banner: a deliberately off-brand violet (not the
           app's green/blue/amber status colors) so a mock-data session is
           never mistaken for the real app. Not sticky, to avoid fighting the
           sticky .activity-toolbar. */
        .dev-banner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            border-bottom: 1px solid #4c1d95;
            background: #6d28d9;
            color: #f5f3ff;
            font-family: var(--mono);
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 6px 14px;
            text-align: center;
        }
        :root[data-theme="dark"] .dev-banner {
            border-bottom-color: #2e1065;
            background: #7c3aed;
        }
    </style>
</head>
<body hx-ext="sse" sse-connect="/api/events">
{% if dev_mode %}
<div class="dev-banner" role="status" aria-label="Development mode">
    <span class="dev-banner-dot" aria-hidden="true"></span>
    Dev mode · mock data · no real Garmin / Strava
</div>
{% endif %}
<main class="app-shell">
{% block content %}{% endblock %}
</main>
<script>
  document.body.addEventListener('htmx:beforeSwap', function (e) {
    if (e.detail.xhr.status === 409) { e.detail.shouldSwap = true; e.detail.isError = false; }
  });
</script>
</body>
</html>
