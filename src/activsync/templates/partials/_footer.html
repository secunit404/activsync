{% set status = update_status() %}
<footer class="app-footer">
    <span class="app-footer-version">ActivSync v{{ app_version }}</span>
    {% if status.update_available %}
    <a class="app-footer-update" href="{{ status.release_url }}"
       target="_blank" rel="noopener"
       aria-label="Update available: v{{ status.latest }}"
       title="Update available: v{{ status.latest }}">
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 18.5V6M6 11.5 12 5.5l6 6" fill="none" stroke="currentColor"
                  stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </a>
    {% endif %}
    <span class="app-footer-sep" aria-hidden="true">·</span>
    <a href="{{ status.repo_url }}" target="_blank" rel="noopener">GitHub</a>
</footer>
