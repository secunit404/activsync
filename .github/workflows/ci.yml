name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install (with dev extras)
        run: pip install ".[dev]"
      - name: Run tests
        run: python -m pytest

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build image (smoke test, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: activsync:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
